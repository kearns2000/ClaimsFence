name: ci

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

  publish:
    name: Publish to NuGet
    # Only publish for version tags, e.g. v1.0.0
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      # Required for NuGet.org trusted publishing (OIDC token exchange).
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: |
          dotnet pack src/ClaimsFence/ClaimsFence.csproj \
            --configuration Release \
            -p:Version=${{ steps.version.outputs.version }} \
            --output ${{ github.workspace }}/artifacts
          dotnet pack src/ClaimsFence.AspNetCore/ClaimsFence.AspNetCore.csproj \
            --configuration Release \
            -p:Version=${{ steps.version.outputs.version }} \
            --output ${{ github.workspace }}/artifacts

      # Exchanges the GitHub Actions OIDC token for a short-lived NuGet.org API key.
      # Configure a Trusted Publishing policy on nuget.org for this repository/workflow,
      # and set the repository secret NUGET_USER to your nuget.org account name.
      - name: NuGet login (trusted publishing)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push packages
        run: >-
          dotnet nuget push "${{ github.workspace }}/artifacts/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Push symbol packages
        run: >-
          dotnet nuget push "${{ github.workspace }}/artifacts/*.snupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
